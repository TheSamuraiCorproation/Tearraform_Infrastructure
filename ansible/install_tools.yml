---
- name: Configure EC2 instance (Golden AMI)
  hosts: all
  become: yes
  gather_facts: no

  vars:
    tools_to_install: []
    aws_region: eu-central-1

    # CloudWatch
    cloudwatch_agent_deb_url: "https://amazoncloudwatch-agent.s3.amazonaws.com/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb"
    cloudwatch_agent_local: "/tmp/amazon-cloudwatch-agent.deb"
    cloudwatch_agent_conf_dest: "/opt/aws/amazon-cloudwatch-agent/etc/cloudwatch-agent.json"
    cloudwatch_log_group_prefix: "/terraform-infra/ec2-lab"
    cloudwatch_namespace: "EC2/LabMonitoring"

    docker_packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - docker.io
      - jq
      - unzip

  tasks:

    ########################################################################
    # PRE-FLIGHT
    ########################################################################
    - name: Ensure python3 is installed (preflight)
      raw: |
        if [ -x /usr/bin/python3 ]; then
          exit 0
        fi
        DEBIAN_FRONTEND=noninteractive apt-get update -y
        DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-apt
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

    - name: Show tools to install
      ansible.builtin.debug:
        msg: "Tools requested: {{ tools_to_install | default([]) }}"

    ########################################################################
    # WAIT FOR APT LOCK
    ########################################################################
    - name: Wait for apt/dpkg locks
      ansible.builtin.shell: |
        timeout=180
        waited=0
        while (fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
               fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
               fuser /var/lib/apt/lists/lock >/dev/null 2>&1); do
          sleep 2
          waited=$((waited+2))
          if [ "$waited" -ge "$timeout" ]; then
            echo "ERROR: apt lock timeout"
            exit 2
          fi
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base utilities
      ansible.builtin.apt:
        name:
          - wget
          - curl
          - jq
          - ca-certificates
          - apt-transport-https
          - lsb-release
          - gnupg
        state: present

    ########################################################################
    # CLOUDWATCH AGENT (FIXED)
    ########################################################################
    - name: Check if CloudWatch agent exists
      ansible.builtin.stat:
        path: /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl
      register: cw_agent_bin

    - name: Download CloudWatch agent
      ansible.builtin.get_url:
        url: "{{ cloudwatch_agent_deb_url }}"
        dest: "{{ cloudwatch_agent_local }}"
      when: not cw_agent_bin.stat.exists

    - name: Install CloudWatch agent
      ansible.builtin.command:
        cmd: "dpkg -i {{ cloudwatch_agent_local }}"
      ignore_errors: true
      when: not cw_agent_bin.stat.exists

    - name: Fix dependencies
      ansible.builtin.command: apt-get -f -y install

    - name: Ensure CloudWatch directory exists
      ansible.builtin.file:
        path: /opt/aws/amazon-cloudwatch-agent/etc
        state: directory
        mode: "0755"

    - name: Deploy CloudWatch config
      ansible.builtin.template:
        src: "amazon-cloudwatch-agent.j2"
        dest: "{{ cloudwatch_agent_conf_dest }}"
        mode: "0644"

    # 🔥 CRITICAL FIX HERE
    - name: Load config and start CloudWatch agent
      ansible.builtin.command: >
        /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl
        -a fetch-config
        -m ec2
        -c file:{{ cloudwatch_agent_conf_dest }}
        -s
      register: cw_start
      changed_when: true

    - name: Verify CloudWatch agent running
      ansible.builtin.command:
        cmd: /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a status
      register: cw_status
      retries: 6
      delay: 5
      until: "'running' in cw_status.stdout"

    - name: Debug CloudWatch status
      ansible.builtin.debug:
        var: cw_status.stdout

    ########################################################################
    # CLASSIFY TOOLS
    ########################################################################
    - name: Initialize lists
      ansible.builtin.set_fact:
        apt_packages: []
        ecr_images: []

    - name: Classify APT tools
      ansible.builtin.set_fact:
        apt_packages: "{{ apt_packages + [item] }}"
      when: item is string
      loop: "{{ tools_to_install }}"

    - name: Classify ECR tools
      ansible.builtin.set_fact:
        ecr_images: "{{ ecr_images + [item] }}"
      when: item is mapping
      loop: "{{ tools_to_install }}"

    - name: Debug classification
      ansible.builtin.debug:
        msg:
          - "APT: {{ apt_packages }}"
          - "ECR: {{ ecr_images }}"

    ########################################################################
    # INSTALL APT PACKAGES
    ########################################################################
    - name: Install APT packages
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present
      when: apt_packages | length > 0

    ########################################################################
    # DOCKER + AWS CLI
    ########################################################################
    - name: Setup Docker if needed
      when: ecr_images | length > 0
      block:
        - name: Install Docker + Compose plugin
  	  apt:
	    name:
	      - docker.io
	      - docker-compose-plugin
	      - jq
	      - unzip
	      - curl
	      - ca-certificates
	      - gnupg
	      - lsb-release
	    state: present
	    update_cache: yes

        - name: Start docker
          ansible.builtin.service:
            name: docker
            state: started
            enabled: yes

        - name: Install AWS CLI v2
          ansible.builtin.shell: |
            tmpdir=$(mktemp -d)
            cd "$tmpdir"
            curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o awscliv2.zip
            unzip -q awscliv2.zip
            sudo ./aws/install --update || true
          args:
            creates: /usr/local/bin/aws

    ########################################################################
    # DEPLOY CONTAINERS
    ########################################################################
    - name: Deploy ECR containers
      ansible.builtin.include_tasks: "tasks/deploy_ecr_container.yml"
      loop: "{{ ecr_images }}"
      loop_control:
        loop_var: ecr
      when: ecr_images | length > 0

    ########################################################################
    # FINAL
    ########################################################################
    - name: Final message
      ansible.builtin.debug:
        msg: "EC2 fully configured with CloudWatch + tools 🚀"
