---
- name: Configure EC2 instance and deploy container tools
  hosts: all
  become: yes

  vars:
    tools_to_install: []
    docker_pkg: docker.io
    awscli_pkg: awscli

  tasks:
    - name: Gather facts
      ansible.builtin.setup:

    - name: Show tools to install
      ansible.builtin.debug:
        msg: "Tools requested: {{ tools_to_install | default([]) }}"

    - name: Ensure apt cache up to date
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install basic packages
      ansible.builtin.apt:
        name:
          - "{{ docker_pkg }}"
          - python3
          - python3-pip
          - curl
          - jq
          - apt-transport-https
          - ca-certificates
        state: present

    - name: Ensure docker service started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure pip docker library available (for potential docker modules)
      ansible.builtin.pip:
        name: docker
        executable: pip3
        state: present

    - name: Ensure awscli present (used for ecr login)
      ansible.builtin.apt:
        name: "{{ awscli_pkg }}"
        state: present
      register: awscli_installed
      failed_when: awscli_installed is failed and false  # don't hard fail on minor apt issues

    - name: Create helper directory for Docker logs
      ansible.builtin.file:
        path: /var/log/docker-tools
        state: directory
        owner: root
        group: root
        mode: '0755'

    #################################################################
    # Deploy requested container tools (works with DockerHub or ECR)
    # Each tool entry expected (recommended):
    # { "name": "suricata", "image": "430118.../suricata-custom:latest", "ports": [ "80:80" ] }
    #################################################################
    - name: Normalize tools list (ensure dict structure)
      ansible.builtin.set_fact:
        normalized_tools: >-
          {{
            tools_to_install | default([]) | map('combine', {'name': '', 'image': '', 'ports': []}) | list
          }}

    - name: Deploy each requested tool (loop)
      ansible.builtin.block:
        - name: Validate tool has image
          ansible.builtin.assert:
            that:
              - item.image is defined
              - item.image | length > 0
            fail_msg: "Tool {{ item.name | default('?') }} missing 'image' property; cannot proceed."

        - name: If ECR image, login via awscli (uses instance role)
          ansible.builtin.shell: >
            aws ecr get-login-password --region {{ aws_region | default('eu-central-1') }} |
            docker login --username AWS --password-stdin {{ (item.image.split('/')[0]) }}
          args:
            warn: false
          when: item.image is search('\\.dkr\\.ecr\\.')
          register: ecr_login
          failed_when: ecr_login.rc != 0 and ('Login Succeeded' not in (ecr_login.stdout + ecr_login.stderr))
          changed_when: "'Login Succeeded' in (ecr_login.stdout + ecr_login.stderr)"

        - name: Pull image {{ item.image }}
          ansible.builtin.shell: docker pull {{ item.image }}
          register: pull_result
          changed_when: "'Downloaded newer image' in pull_result.stdout or 'Status: Downloaded' in pull_result.stdout or pull_result.rc == 0"

        - name: Stop existing container if present
          ansible.builtin.shell: |
            if docker ps -a --format '{{'{{'}}.Names{{'}}'}}' | grep -x {{ item.name }} >/dev/null 2>&1; then
              docker rm -f {{ item.name }} || true
            fi
          args:
            warn: false

        - name: Run container {{ item.name }}
          ansible.builtin.shell: |
            # build port flags
            PORT_FLAGS=""
            {% raw %}{% endraw %}
            {% for p in item.ports %}
            PORT_FLAGS="$PORT_FLAGS -p {{ p }}"
            {% endfor %}
            # run container (detached) with restart unless-stopped
            docker run -d --name {{ item.name }} $PORT_FLAGS --restart unless-stopped {{ item.image }}
          args:
            executable: /bin/bash
          register: run_res
          failed_when: run_res.rc != 0

        - name: Wait for container to be healthy (simple check)
          ansible.builtin.shell: |
            for i in $(seq 1 12); do
              docker ps --filter "name={{ item.name }}" --filter "status=running" -q && exit 0 || sleep 5
            done
            exit 1
          register: container_running
          failed_when: container_running.rc != 0

      loop: "{{ normalized_tools }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Final message
      ansible.builtin.debug:
        msg: "EC2 configuration and container deployment completed."
