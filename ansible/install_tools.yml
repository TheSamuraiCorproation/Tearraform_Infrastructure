# ansible/install_tools.yml
---

- name: Configure EC2 instance (Golden AMI)
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    cloudwatch_namespace: "GoldenAMI/EC2"
    cloudwatch_log_group_prefix: "/ec2/golden-ami"
    aws_region: "eu-central-1"

  tasks:

  ########################################################################
  # BASE SYSTEM
  ########################################################################

  - name: Ensure python3 is installed
    raw: test -e /usr/bin/python3 || (apt-get update -y && apt-get install -y python3-minimal)
    changed_when: false

  - name: Gather facts
    setup:

  - name: Show tools to install
    debug:
      msg: "Tools requested: {{ tools_to_install }}"

  ########################################################################
  # APT LOCK FIX (SAFE VERSION)
  ########################################################################

  - name: Disable apt auto services (safe for CI)
    shell: |
      systemctl stop unattended-upgrades || true
      systemctl stop apt-daily.service || true
      systemctl stop apt-daily-upgrade.service || true
      systemctl stop apt-daily.timer || true
      systemctl stop apt-daily-upgrade.timer || true

      systemctl disable unattended-upgrades || true
      systemctl disable apt-daily.service || true
      systemctl disable apt-daily-upgrade.service || true
    changed_when: false
    failed_when: false

  - name: Wait for apt locks to be released
    shell: |
      while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
            fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
            fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || \
            fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
        echo "Waiting for apt lock..."
        sleep 2
      done
    changed_when: false

  ########################################################################
  # PACKAGE INSTALL
  ########################################################################

  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install base packages
    apt:
      name:
        - curl
        - wget
        - unzip
        - jq
        - docker.io
        - awscli
      state: present

  ########################################################################
  # CLOUDWATCH
  ########################################################################

  - name: Download CloudWatch agent
    get_url:
      url: https://amazoncloudwatch-agent.s3.amazonaws.com/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
      dest: /tmp/amazon-cloudwatch-agent.deb
      mode: '0644'

  - name: Install CloudWatch agent
    apt:
      deb: /tmp/amazon-cloudwatch-agent.deb
      state: present

  - name: Create CloudWatch config directory
    file:
      path: /opt/aws/amazon-cloudwatch-agent/etc
      state: directory
      mode: '0755'

  - name: Deploy CloudWatch agent configuration
    template:
      src: templates/amazon-cloudwatch-agent.j2
      dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
      mode: '0644'

  - name: Start CloudWatch agent
    shell: |
      /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
        -a fetch-config \
        -m ec2 \
        -s \
        -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    changed_when: true

  ########################################################################
  # FIREFOX (SAFE INSTALL)
  ########################################################################

  - name: Ensure no apt locks before Firefox install
    shell: |
      while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
            fuser /var/lib/dpkg/lock >/dev/null 2>&1; do
        sleep 2
      done
    changed_when: false

  - name: Install Firefox
    apt:
      name: firefox
      state: present
    register: firefox_install
    ignore_errors: yes

  - name: Fallback install Firefox via snap
    snap:
      name: firefox
      state: present
    when: firefox_install is failed
    ignore_errors: yes

  ########################################################################
  # DOCKER
  ########################################################################

  - name: Start Docker
    systemd:
      name: docker
      state: started
      enabled: yes

  - name: Add ubuntu user to docker group
    user:
      name: ubuntu
      groups: docker
      append: yes

  - name: Restart Docker to apply group changes
    systemd:
      name: docker
      state: restarted

  - name: Wait for Docker to be ready
    shell: docker info
    register: docker_ready
    retries: 5
    delay: 3
    until: docker_ready.rc == 0
    changed_when: false
    
  ########################################################################
  # ECR LOGIN
  ########################################################################

  - name: Login to ECR
    shell: |
      aws ecr get-login-password --region {{ aws_region }} | \
      docker login --username AWS --password-stdin 430118831270.dkr.ecr.eu-central-1.amazonaws.com
    changed_when: false

  ########################################################################
  # PRE-DEPLOY: ELK NETWORK & LOGSTASH CONFIG
  ########################################################################

  - name: Check if ELK stack is requested
    set_fact:
      elk_requested: "{{ tools_to_install | selectattr('name', 'in', ['elasticsearch', 'kibana', 'logstash']) | list | length > 0 }}"

  - name: Create Docker network for ELK
    shell: docker network create elk-net || true
    when: elk_requested
    changed_when: false

  - name: Ensure /var/log/suricata directory exists
    file:
      path: /var/log/suricata
      state: directory
      mode: '0755'
    when: "'suricata' in (tools_to_install | map(attribute='name') | list)"

  - name: Fix permissions so Logstash can read Suricata logs
    shell: chmod -R 755 /var/log/suricata
    when: "'suricata' in (tools_to_install | map(attribute='name') | list) and elk_requested"
    changed_when: false

  - name: Create Logstash pipeline directory
    file:
      path: /opt/logstash/pipeline
      state: directory
      mode: '0755'
    when: "'logstash' in (tools_to_install | map(attribute='name') | list)"

  - name: Configure Logstash to read Suricata logs and send to Elasticsearch
    copy:
      dest: /opt/logstash/pipeline/suricata.conf
      content: |
        input {
          file {
            path => "/var/log/suricata/eve.json"
            start_position => "beginning"
            sincedb_path => "/dev/null"
            mode => "read"
            codec => json
          }
        }
        output {
          elasticsearch {
            hosts => ["http://elasticsearch:9200"]
            index => "suricata-logs"
          }
        }
    when: "'logstash' in (tools_to_install | map(attribute='name') | list)"

  ########################################################################
  # DEPLOY CONTAINERS
  ########################################################################

  - name: Pull and run Docker containers for tools
    include_tasks: tasks/deploy_container.yml
    loop: "{{ tools_to_install }}"
    loop_control:
      loop_var: tool
    when: tools_to_install is defined and tools_to_install | length > 0

  ########################################################################
  # DONE
  ########################################################################

  - name: Done
    debug:
      msg: "EC2 READY ✅"
