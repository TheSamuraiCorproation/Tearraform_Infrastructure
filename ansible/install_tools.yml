---
- name: Configure EC2 instance (Golden AMI)
  hosts: all
  become: yes
  gather_facts: no

  vars:
    tools_to_install: []
    aws_region: eu-central-1

    cloudwatch_agent_deb_url: "https://amazoncloudwatch-agent.s3.amazonaws.com/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb"
    cloudwatch_agent_local: "/tmp/amazon-cloudwatch-agent.deb"
    cloudwatch_agent_conf_dest: "/opt/aws/amazon-cloudwatch-agent/etc/cloudwatch-agent.json"

    cloudwatch_log_group_prefix: "/terraform-infra/ec2-lab"
    cloudwatch_namespace: "EC2/LabMonitoring"

    docker_keyring: /etc/apt/keyrings/docker.asc
    docker_list_file: /etc/apt/sources.list.d/docker.list

  tasks:
    - name: Ensure python3 is installed
      raw: |
        if [ -x /usr/bin/python3 ]; then exit 0; fi
        apt-get update -y && apt-get install -y python3 python3-apt
      changed_when: false

    - name: Gather facts
      ansible.builtin.setup:

    - name: Show tools to install
      debug:
        msg: "Tools requested: {{ tools_to_install }}"

    - name: Wait for apt locks
      shell: |
        timeout=180
        waited=0
        while (fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 || \
               fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
               fuser /var/lib/apt/lists/lock >/dev/null 2>&1); do
          sleep 2
          waited=$((waited+2))
          if [ "$waited" -ge "$timeout" ]; then
            echo "ERROR: apt lock timeout"
            exit 2
          fi
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Update apt
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - wget
          - curl
          - jq
          - ca-certificates
          - apt-transport-https
          - lsb-release
          - gnupg
        state: present

    - name: Download CloudWatch agent
      get_url:
        url: "{{ cloudwatch_agent_deb_url }}"
        dest: "{{ cloudwatch_agent_local }}"

    - name: Install CloudWatch agent
      shell: |
        dpkg -i {{ cloudwatch_agent_local }} || apt-get -f -y install
      args:
        executable: /bin/bash

    - name: Create config dir
      file:
        path: /opt/aws/amazon-cloudwatch-agent/etc
        state: directory

    - name: Deploy CloudWatch config
      template:
        src: amazon-cloudwatch-agent.j2
        dest: "{{ cloudwatch_agent_conf_dest }}"

    - name: Start CloudWatch agent
      shell: |
        /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
        -a fetch-config -m ec2 -c file:{{ cloudwatch_agent_conf_dest }} -s
      args:
        executable: /bin/bash

    - name: Install Firefox browser for DCV
      apt:
        name:
          - firefox
          - xdg-utils
        state: present
        update_cache: yes

    - name: Force Firefox as system default browser
      shell: |
        update-alternatives --set x-www-browser /usr/bin/firefox || true
        update-alternatives --set gnome-www-browser /usr/bin/firefox || true
      args:
        executable: /bin/bash
      ignore_errors: true

    - name: Set default web browser for ubuntu desktop
      become_user: ubuntu
      shell: |
        export HOME=/home/ubuntu
        xdg-settings set default-web-browser firefox.desktop || true
      args:
        executable: /bin/bash
      ignore_errors: true

    - name: Init lists
      set_fact:
        apt_packages: []
        ecr_images: []

    - name: Classify tools
      set_fact:
        apt_packages: "{{ apt_packages + [item] if item is string else apt_packages }}"
        ecr_images: "{{ ecr_images + [item] if item is mapping else ecr_images }}"
      loop: "{{ tools_to_install }}"

    - name: Add Docker key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o {{ docker_keyring }}
        chmod a+r {{ docker_keyring }}
      args:
        executable: /bin/bash

    - name: Add Docker repo
      shell: |
        . /etc/os-release
        echo "deb [arch=$(dpkg --print-architecture) signed-by={{ docker_keyring }}] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" > {{ docker_list_file }}
      args:
        executable: /bin/bash

    - name: Update apt again
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Deploy ELK
      include_tasks: tasks/deploy_elk.yml
      loop: "{{ ecr_images }}"
      loop_control:
        loop_var: ecr
      when: ecr.name == "elk"

    - name: Deploy other containers
      include_tasks: tasks/deploy_ecr_container.yml
      loop: "{{ ecr_images }}"
      loop_control:
        loop_var: ecr
      when: ecr.name != "elk"

    - name: Done
      debug:
        msg: "EC2 READY 🚀"
