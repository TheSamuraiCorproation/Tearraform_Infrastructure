# ansible/tasks/deploy_container.yml
---

- name: "Create directories if needed for {{ tool.name }}"
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "/var/log/{{ tool.name }}"
    - "/opt/{{ tool.name }}"
  when: tool.name in ['suricata', 'elk']

# ---------------------------------------------------
# Pull image
# ---------------------------------------------------
- name: "Pull Docker image for {{ tool.name }}"
  shell: docker pull {{ tool.ecr_repo_url }}:{{ tool.image_tag }}
  register: pull_result
  retries: 3
  delay: 5
  until: pull_result.rc == 0

# ---------------------------------------------------
# Stop old container
# ---------------------------------------------------
- name: "Remove existing container {{ tool.name }}"
  shell: |
    docker stop {{ tool.name }} 2>/dev/null || true
    docker rm {{ tool.name }} 2>/dev/null || true
  ignore_errors: yes

# ---------------------------------------------------
# Run container (WITH ENV)
# ---------------------------------------------------
- name: "Run container {{ tool.name }} with env"
  shell: |
    docker run --name {{ tool.name }} \
    {% for key, value in tool.env.items() %}
    -e {{ key }}="{{ value }}" \
    {% endfor %}
    {{ tool.run_args }} \
    {{ tool.ecr_repo_url }}:{{ tool.image_tag }}
  args:
    executable: /bin/bash
  when: tool.env is defined
  async: 30
  poll: 0

# ---------------------------------------------------
# Run container (NO ENV)
# ---------------------------------------------------
- name: "Run container {{ tool.name }}"
  shell: |
    docker run --name {{ tool.name }} \
    {{ tool.run_args }} \
    {{ tool.ecr_repo_url }}:{{ tool.image_tag }}
  args:
    executable: /bin/bash
  when: tool.env is not defined
  async: 30
  poll: 0

# ---------------------------------------------------
# Verify container started
# ---------------------------------------------------
- name: "Wait for {{ tool.name }} to start"
  shell: docker ps --filter "name={{ tool.name }}" --format "{{ '{{.Status}}' }}"
  register: container_status
  retries: 5
  delay: 3
  until: container_status.stdout is search("Up")
  ignore_errors: yes

- name: "Show status for {{ tool.name }}"
  debug:
    msg: "Container {{ tool.name }} status: {{ container_status.stdout | default('NOT RUNNING') }}"
