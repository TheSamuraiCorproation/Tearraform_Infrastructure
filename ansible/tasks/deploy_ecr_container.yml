---
# File: deploy_ecr_container.yml
# Purpose: Deploy containers from ECR images on EC2 instances (included by install_tools.yml)

- name: Determine container name and run args
  set_fact:
    container_name: "{{ ecr.name | default(ecr.ecr_repo_url.split('/')[-1]) }}"
    run_args: "{{ ecr.run_args | default('-d --restart always') }}"
    image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
  become: yes

- name: Authenticate Docker to ECR
  amazon.aws.aws_ecr:
    registry_ids: "{{ image_full.split('.')[0] }}"
    state: login
  become: yes

- name: Pull the ECR image
  community.docker.docker_image:
    name: "{{ image_full }}"
    source: pull
  become: yes

- name: Run container
  community.docker.docker_container:
    name: "{{ container_name }}"
    image: "{{ image_full }}"
    state: started
    restart_policy: unless-stopped
    recreate: yes
    command: "{{ run_args }}"
  become: yes
