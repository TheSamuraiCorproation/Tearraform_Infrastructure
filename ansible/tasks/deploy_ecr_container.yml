---
# This file is included in a loop from install_tools.yml
# It receives one variable: item (one tool mapping)

#####################################################################
# If there is a dedicated deployment file for this tool → use it
#####################################################################

- name: "Check if dedicated deployment task file exists for {{ item.name }}"
  delegate_to: localhost
  run_once: false
  stat:
    path: "{{ playbook_dir }}/tasks/deploy_{{ item.name }}.yml"
  register: tool_task_file

- name: "Include dedicated deploy file for {{ item.name }} if exists"
  include_tasks: "deploy_{{ item.name }}.yml"
  when: tool_task_file.stat.exists

#####################################################################
# If there is NO dedicated file → do generic docker deployment
#####################################################################

- name: "Generic: compute image & container variables"
  when: not tool_task_file.stat.exists
  set_fact:
    full_image: "{{ item.ecr_repo_url }}:{{ item.image_tag | default('latest') }}"
    container_name: "{{ item.name }}"

- name: "Generic: login to ECR"
  when: not tool_task_file.stat.exists
  shell: |
    aws ecr get-login-password --region {{ aws_region }} \
    | docker login --username AWS --password-stdin {{ item.ecr_repo_url.split('/')[0] }}
  args:
    warn: false

- name: "Generic: pull image {{ container_name }}"
  when: not tool_task_file.stat.exists
  shell: docker pull {{ full_image }}

- name: "Generic: stop existing container {{ container_name }} if running"
  when: not tool_task_file.stat.exists
  shell: docker rm -f {{ container_name }} || true

- name: "Generic: run container {{ container_name }}"
  when: not tool_task_file.stat.exists
  shell: >
    docker run -d
    --name {{ container_name }}
    {{ item.run_args | default('') }}
    {{ full_image }}
