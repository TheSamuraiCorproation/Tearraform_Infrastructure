---
# ansible/tasks/deploy_ecr_container.yml
# Called from install_tools.yml with: include_tasks: "tasks/deploy_ecr_container.yml"
# Loop uses loop_var: ecr (so this file must reference `ecr`, not `item`)

- name: "Set dedicated task filename (controller path)"
  ansible.builtin.set_fact:
    dedicated_task_file: "tasks/deploy_{{ (ecr.name | default('tool')) | lower }}.yml"

- name: "Check for dedicated deploy task file on controller"
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/{{ dedicated_task_file }}"
  delegate_to: localhost
  become: false
  register: dedicated_task_exists
  changed_when: false

- name: "Include dedicated deploy task for {{ ecr.name | default('tool') }} if present"
  ansible.builtin.include_tasks: "{{ dedicated_task_file }}"
  when: dedicated_task_exists.stat.exists

- name: "Generic: compute image & container variables"
  ansible.builtin.set_fact:
    container_name: "{{ (ecr.name | default(ecr.ecr_repo_url.split('/')[-1])) | lower }}"
    image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
    registry_host: "{{ ecr.ecr_repo_url.split('/')[0] }}"
    run_args: "{{ ecr.run_args | default('-d --restart unless-stopped') }}"
    # Build -e KEY=VALUE flags from the env object if present, otherwise empty string
    env_flags: >-
      {{
        ecr.env | default({}) | dict2items
        | map(attribute='key') | zip(ecr.env | default({}) | dict2items | map(attribute='value'))
        | map('join', '=')
        | map('regex_replace', '^(.*)$', '-e \1')
        | join(' ')
      }}

- name: "Generic: Login to ECR (if no dedicated task)"
  ansible.builtin.shell: |
    set -eux
    export AWS_DEFAULT_REGION={{ aws_region }}
    aws ecr get-login-password --region {{ aws_region }} \
      | docker login --username AWS --password-stdin {{ registry_host }}
  args:
    executable: /bin/bash
  when: not dedicated_task_exists.stat.exists

- name: "Generic: Pull image (if no dedicated task)"
  ansible.builtin.shell: |
    set -eux
    docker pull {{ image_full }}
  args:
    executable: /bin/bash
  when: not dedicated_task_exists.stat.exists

- name: "Generic: Remove existing container if present (if no dedicated task)"
  ansible.builtin.shell: |
    docker rm -f {{ container_name }} || true
  args:
    executable: /bin/bash
  when: not dedicated_task_exists.stat.exists

- name: "Generic: Run container (if no dedicated task)"
  ansible.builtin.shell: |
    set -eux
    docker run {{ run_args }} {{ env_flags }} --name {{ container_name }} {{ image_full }}
  args:
    executable: /bin/bash
  when: not dedicated_task_exists.stat.exists

- name: "Generic: Verify container is running (if no dedicated task)"
  ansible.builtin.shell: |
    docker ps --filter "name={{ container_name }}" --format "{{.Names}} — {{.Status}}"
  args:
    executable: /bin/bash
  register: container_status
  when: not dedicated_task_exists.stat.exists

- name: "Generic: Show container status (if no dedicated task)"
  ansible.builtin.debug:
    msg: "{{ container_status.stdout }}"
  when: not dedicated_task_exists.stat.exists
