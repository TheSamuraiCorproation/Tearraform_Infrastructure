---
# Deploy one ECR item (loop var is `ecr`)
# Behaviour:
# 1) If a dedicated task file exists at <playbook_dir>/tasks/deploy_<name>.yml then include it.
# 2) Otherwise do a generic docker pull + docker run using any provided run_args.

- name: Set dedicated task filename (controller path)
  set_fact:
    dedicated_task_path: "{{ playbook_dir }}/tasks/deploy_{{ ecr.name | lower }}.yml"

- name: Check if dedicated deploy task exists on controller
  ansible.builtin.stat:
    path: "{{ dedicated_task_path }}"
  delegate_to: localhost
  run_once: true
  register: dedicated_task_stat

- name: Include dedicated deploy task (if it exists)
  ansible.builtin.include_tasks: "{{ 'tasks/deploy_' + (ecr.name | lower) + '.yml' }}"
  when: dedicated_task_stat.stat.exists
  # include_tasks will be evaluated on controller and executed on remote host

- name: Generic ECR deploy (fallback) - login, pull, run
  when: not dedicated_task_stat.stat.exists
  block:
    - name: Compute image and run args
      set_fact:
        image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
        container_name: "{{ (ecr.name | default((ecr.ecr_repo_url.split('/')[-1]))) | lower }}"
        run_args: "{{ ecr.run_args | default('-d --restart unless-stopped') }}"

    - name: Ensure old container removed (if present)
      ansible.builtin.shell: |
        if docker ps -a --format '{{'{{'}}.Names{{'}}'}}' | grep -xq '{{ container_name }}'; then
          docker rm -f {{ container_name }} || true
        fi
      args:
        warn: false

    - name: Login to ECR (use /usr/local/bin/aws if available)
      vars:
        aws_cli: "{{ '/usr/local/bin/aws' if lookup('fileglob','/usr/local/bin/aws', errors='ignore') else 'aws' }}"
        registry: "{{ ecr.ecr_repo_url.split('/')[0] }}"
      ansible.builtin.shell: |
        set -eux
        {{ aws_cli }} ecr get-login-password --region {{ aws_region }} \
          | docker login --username AWS --password-stdin {{ registry }}
      args:
        warn: false

    - name: Pull image from ECR
      ansible.builtin.shell: |
        set -eux
        docker pull {{ image_full }}
      args:
        warn: false

    - name: Run container (generic)
      ansible.builtin.shell: |
        set -eux
        # run_args is expected to include any -p, -v, --cap-add, etc. We append the image name last.
        docker run {{ run_args }} --name {{ container_name }} {{ image_full }}
      args:
        warn: false
