---
# File: ansible/tasks/deploy_ecr_container.yml
# Purpose: Deploy container from AWS ECR without amazon.aws collection

- name: Set image variables
  set_fact:
    container_name: "{{ ecr.name | default(ecr.ecr_repo_url.split('/')[-1]) }}"
    image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
    aws_region: "{{ ecr.ecr_repo_url.split('.')[3] }}"
    aws_registry: "{{ ecr.ecr_repo_url.split('/')[0] }}"
  become: yes

- name: Login to ECR using AWS CLI
  shell: |
    aws ecr get-login-password --region {{ aws_region }} \
    | docker login --username AWS --password-stdin {{ aws_registry }}
  args:
    executable: /bin/bash
  become: yes

- name: Pull Docker image from ECR
  community.docker.docker_image:
    name: "{{ image_full }}"
    source: pull
  become: yes

- name: Remove existing container if present
  community.docker.docker_container:
    name: "{{ container_name }}"
    state: absent
  ignore_errors: yes
  become: yes

- name: Run Docker container
  shell: |
    docker run -d --name {{ container_name }} {{ ecr.run_args | default('') }} {{ image_full }}
  args:
    executable: /bin/bash
  become: yes
