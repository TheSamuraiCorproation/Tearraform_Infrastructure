---
# Runs once per ecr image (loop variable: ecr)

- name: Set image variables
  set_fact:
    img_repo: "{{ ecr.ecr_repo_url }}"
    img_tag: "{{ ecr.image_tag | default('latest') }}"
    container_name: "{{ ecr.name }}"
    run_args: "{{ ecr.run_args | default('-d --restart always --net host') }}"
    svc_name: "container-{{ ecr.name }}"

- name: Debug chosen image
  ansible.builtin.debug:
    msg:
      - "Repository: {{ img_repo }}"
      - "Tag: {{ img_tag }}"
      - "Container: {{ container_name }}"
      - "Run args: {{ run_args }}"

- name: Login to ECR
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ lookup('env','AWS_DEFAULT_REGION') | default('eu-central-1') }} \
    | docker login --username AWS --password-stdin {{ (img_repo.split('/'))[0] }}
  register: ecr_login
  changed_when: true
  failed_when: ecr_login.rc != 0

- name: Pull image
  ansible.builtin.command:
    cmd: docker pull {{ img_repo }}:{{ img_tag }}

- name: Remove existing container if exists
  ansible.builtin.shell: docker rm -f {{ container_name }} || true

- name: Run container
  ansible.builtin.shell: |
    docker run -d \
      --name {{ container_name }} \
      {{ run_args }} \
      {{ img_repo }}:{{ img_tag }}
