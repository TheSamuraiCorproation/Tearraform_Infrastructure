---
# ansible/tasks/deploy_ecr_container.yml
# Called with loop_var: ecr (from install_tools.yml)

- name: "Check for dedicated deploy task file for {{ ecr.name }} (on controller)"
  delegate_to: localhost
  become: false
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/tasks/deploy_{{ ecr.name }}.yml"
  register: tool_task_file

- name: "Include dedicated deploy task for {{ ecr.name }} if present"
  include_tasks: "tasks/deploy_{{ ecr.name }}.yml"
  when: tool_task_file.stat.exists

# Generic fallback path (if no dedicated file)
- name: "Generic: compute image & run vars for {{ ecr.name }}"
  when: not tool_task_file.stat.exists
  ansible.builtin.set_fact:
    full_image: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
    container_name: "{{ (ecr.name | default(ecr.ecr_repo_url.split('/')[-1])) | lower }}"
    run_args: "{{ ecr.run_args | default('') }}"

- name: "Generic: login to ECR for {{ ecr.name }}"
  when: not tool_task_file.stat.exists
  ansible.builtin.shell: |
    set -eux
    export AWS_DEFAULT_REGION={{ aws_region }}
    aws ecr get-login-password --region {{ aws_region }} \
      | docker login --username AWS --password-stdin {{ ecr.ecr_repo_url.split('/')[0] }}
  args:
    warn: false

- name: "Generic: pull image {{ full_image }}"
  when: not tool_task_file.stat.exists
  ansible.builtin.shell: |
    set -eux
    docker pull {{ full_image }}
  args:
    warn: false

- name: "Generic: stop & remove existing container {{ container_name }} (if any)"
  when: not tool_task_file.stat.exists
  ansible.builtin.shell: |
    set -eux
    docker rm -f {{ container_name }} || true
  args:
    warn: false

- name: "Generic: run container {{ container_name }}"
  when: not tool_task_file.stat.exists
  ansible.builtin.shell: |
    set -eux
    # Use run_args if provided; otherwise plain run
    if [ -z "{{ run_args | default('') }}" ]; then
      docker run -d --name {{ container_name }} {{ full_image }}
    else
      # NOTE: run_args may include options like -p, -v, --cap-add, etc.
      docker run -d --name {{ container_name }} {{ run_args }} {{ full_image }}
    fi
  args:
    warn: false
