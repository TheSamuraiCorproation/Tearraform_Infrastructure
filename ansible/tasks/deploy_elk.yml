---
# Deploy ELK (Logstash) container from ECR and prepare pipeline rules

- name: Set ELK variables
  set_fact:
    container_name: "{{ ecr.name | default('elk') }}"
    image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
    registry_host: "{{ ecr.ecr_repo_url.split('/')[0] }}"
    run_args: "{{ ecr.run_args | default('-d --restart unless-stopped') }}"
    elk_pipeline_host_dir: "/opt/elk/pipeline"

# -------------------------------------------------------
# Prepare host directories
# -------------------------------------------------------

- name: Create ELK base directory
  file:
    path: /opt/elk
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create pipeline directory
  file:
    path: "{{ elk_pipeline_host_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

# -------------------------------------------------------
# Copy rules file to EC2
# -------------------------------------------------------

- name: Copy ELK rules file
  copy:
    src: "../files/elk_rules.xml"
    dest: "{{ elk_pipeline_host_dir }}/elk_rules.xml"
    owner: root
    group: root
    mode: '0644'

# -------------------------------------------------------
# Generate Logstash pipeline on controller (Jenkins VM)
# -------------------------------------------------------

- name: Generate logstash pipeline locally on controller
  delegate_to: localhost
  become: false
  run_once: true
  shell: |
    set -eux
    python3 "{{ playbook_dir }}/files/generate_logstash_pipeline.py" \
      "{{ playbook_dir }}/files/elk_rules.xml" \
      > /tmp/01-rules.conf
  args:
    creates: /tmp/01-rules.conf

# -------------------------------------------------------
# Copy generated pipeline to EC2
# -------------------------------------------------------

- name: Copy generated pipeline to EC2
  copy:
    src: /tmp/01-rules.conf
    dest: "{{ elk_pipeline_host_dir }}/01-rules.conf"
    owner: root
    group: root
    mode: '0644'

# -------------------------------------------------------
# Login to AWS ECR
# -------------------------------------------------------

- name: Login to AWS ECR
  shell: |
    set -eux
    export AWS_DEFAULT_REGION={{ aws_region }}
    aws ecr get-login-password --region {{ aws_region }} \
      | docker login --username AWS --password-stdin {{ registry_host }}
  args:
    executable: /bin/bash

# -------------------------------------------------------
# Pull the ELK image
# -------------------------------------------------------

- name: Pull ELK container image
  shell: docker pull {{ image_full }}
  args:
    executable: /bin/bash

# -------------------------------------------------------
# Remove existing container if exists
# -------------------------------------------------------

- name: Remove existing ELK container
  shell: docker rm -f {{ container_name }} || true
  args:
    executable: /bin/bash

# -------------------------------------------------------
# Run ELK container
# -------------------------------------------------------

- name: Run ELK container
  shell: |
    docker run {{ run_args }} \
      --name {{ container_name }} \
      {{ image_full }}
  args:
    executable: /bin/bash

# -------------------------------------------------------
# Wait for Logstash port
# -------------------------------------------------------

- name: Wait for Logstash Beats port
  wait_for:
    port: 5044
    host: 127.0.0.1
    delay: 5
    timeout: 60

# -------------------------------------------------------
# Show running containers
# -------------------------------------------------------

- name: Show running containers
  shell: docker ps
  register: docker_ps

- debug:
    var: docker_ps.stdout_lines
