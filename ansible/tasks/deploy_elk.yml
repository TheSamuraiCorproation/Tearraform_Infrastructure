---
# ansible/tasks/deploy_elk.yml
# Dedicated deploy logic for ELK container pulled from ECR

# --------------------------------------------------
# Variables
# --------------------------------------------------

- name: Set basic ELK variables
  set_fact:
    container_name: "{{ (ecr.name | default('elk')) | lower }}"
    image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
    registry_host: "{{ ecr.ecr_repo_url.split('/')[0] }}"
    run_args: "{{ ecr.run_args | default('-d --restart unless-stopped') }}"
    elk_base_dir: "/opt/elk"

- name: Set pipeline variables
  set_fact:
    elk_pipeline_dir: "{{ elk_base_dir }}/pipeline"
    generated_pipeline_on_controller: "{{ playbook_dir }}/tmp/01-rules.conf"

# --------------------------------------------------
# Create directories on EC2
# --------------------------------------------------

- name: Create ELK base directory
  file:
    path: "{{ elk_base_dir }}"
    state: directory
    mode: "0755"

- name: Create pipeline directory
  file:
    path: "{{ elk_pipeline_dir }}"
    state: directory
    mode: "0755"

# --------------------------------------------------
# Copy rules to EC2
# --------------------------------------------------

- name: Copy ELK rules to host
  copy:
    src: "files/elk_rules.xml"
    dest: "{{ elk_pipeline_dir }}/elk_rules.xml"
    mode: "0644"

# --------------------------------------------------
# Prepare tmp folder on Jenkins controller
# --------------------------------------------------

- name: Ensure tmp dir exists on controller
  delegate_to: localhost
  run_once: true
  become: false
  file:
    path: "{{ playbook_dir }}/tmp"
    state: directory
    mode: "0755"

# --------------------------------------------------
# Generate Logstash pipeline from rules
# --------------------------------------------------

- name: Generate Logstash pipeline from rules
  delegate_to: localhost
  run_once: true
  become: false
  shell: |
    python3 "{{ playbook_dir }}/files/generate_logstash_pipeline.py" \
    "{{ playbook_dir }}/files/elk_rules.xml" \
    > "{{ generated_pipeline_on_controller }}"
  args:
    executable: /bin/bash

# --------------------------------------------------
# Copy generated pipeline to EC2
# --------------------------------------------------

- name: Copy generated Logstash pipeline
  copy:
    src: "{{ generated_pipeline_on_controller }}"
    dest: "{{ elk_pipeline_dir }}/01-rules.conf"
    mode: "0644"

# --------------------------------------------------
# Login to ECR
# --------------------------------------------------

- name: Login to AWS ECR
  shell: |
    aws ecr get-login-password --region eu-central-1 \
    | docker login --username AWS --password-stdin {{ registry_host }}
  args:
    executable: /bin/bash

# --------------------------------------------------
# Pull ELK image
# --------------------------------------------------

- name: Pull ELK image
  shell: docker pull "{{ image_full }}"
  args:
    executable: /bin/bash

# --------------------------------------------------
# Remove old container if exists
# --------------------------------------------------

- name: Remove old ELK container
  shell: |
    if docker ps -a --format '{{.Names}}' | grep -q '^{{ container_name }}$'; then
      docker rm -f {{ container_name }}
    fi
  args:
    executable: /bin/bash
  ignore_errors: true

# --------------------------------------------------
# Run ELK container
# --------------------------------------------------

- name: Run ELK container
  shell: |
    docker run {{ run_args }} \
      --name {{ container_name }} \
      {{ image_full }}
  args:
    executable: /bin/bash

# --------------------------------------------------
# Wait for Logstash to start
# --------------------------------------------------

- name: Wait for Logstash port
  wait_for:
    port: 5044
    host: "{{ inventory_hostname }}"
    timeout: 60

# --------------------------------------------------
# Debug containers
# --------------------------------------------------

- name: Show running containers
  shell: docker ps --format '{{.Names}}|{{.Image}}|{{.Status}}|{{.Ports}}'
  register: docker_ps
  changed_when: false

- debug:
    var: docker_ps.stdout_lines
