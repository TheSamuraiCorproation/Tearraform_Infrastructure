---
- name: Deploy ELK container stack
  hosts: all
  become: yes
  vars:
    elk_base_dir: /opt/elk
    elk_pipeline_dir: "{{ elk_base_dir }}/pipeline"
    elk_rules_src: "ansible/files/elk_rules.xml"
    elk_rules_dest: "{{ elk_pipeline_dir }}/elk_rules.xml"
    elk_image_name: "430118831270.dkr.ecr.eu-central-1.amazonaws.com/elk-logstash:latest"

  tasks:

    - name: Set ELK variables
      debug:
        msg:
          - "ELK base dir: {{ elk_base_dir }}"
          - "Pipeline dir: {{ elk_pipeline_dir }}"
          - "ELK image: {{ elk_image_name }}"

    - name: Create ELK base directory
      file:
        path: "{{ elk_base_dir }}"
        state: directory
        mode: '0755'

    - name: Create pipeline directory
      file:
        path: "{{ elk_pipeline_dir }}"
        state: directory
        mode: '0755'

    - name: Copy ELK rules file
      copy:
        src: "{{ elk_rules_src }}"
        dest: "{{ elk_rules_dest }}"
        mode: '0644'

    - name: Ensure Docker Compose CLI plugin is installed
      shell: |
        if ! docker compose version >/dev/null 2>&1; then
          mkdir -p ~/.docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.22.0/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
          chmod +x ~/.docker/cli-plugins/docker-compose
        fi
      args:
        executable: /bin/bash

    - name: Login to AWS ECR for ELK
      shell: |
        aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 430118831270.dkr.ecr.eu-central-1.amazonaws.com
      args:
        executable: /bin/bash

    - name: Pull ELK container image
      shell: docker pull "{{ elk_image_name }}"
      args:
        executable: /bin/bash

    - name: Remove existing ELK container if present
      shell: |
        if docker ps -a --format '{{.Names}}' | grep -q '^elk$'; then
          docker rm -f elk
        fi
      args:
        executable: /bin/bash
      ignore_errors: true

    - name: Run ELK container (Logstash + Beats)
      shell: |
        docker run -d \
          --name elk \
          --restart unless-stopped \
          -p 5044:5044 \
          -v {{ elk_pipeline_dir }}:/usr/share/logstash/pipeline \
          "{{ elk_image_name }}"
      args:
        executable: /bin/bash

    - name: Show running containers
      shell: docker ps --format '{{.Names}}|{{.Image}}|{{.Status}}|{{.Ports}}'
      register: docker_ps
      changed_when: false

    - debug:
        var: docker_ps.stdout_lines
