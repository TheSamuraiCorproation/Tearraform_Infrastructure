---
- name: Set basic ELK variables
  set_fact:
    container_name: "{{ (ecr.name | default('elk')) | lower }}"
    image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
    registry_host: "{{ ecr.ecr_repo_url.split('/')[0] }}"
    elk_base_dir: "/opt/elk"

- name: Set pipeline variables
  set_fact:
    elk_pipeline_dir: "{{ elk_base_dir }}/pipeline"
    elk_rules_dir: "{{ elk_base_dir }}/rules"

- name: Create ELK base directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ elk_base_dir }}"
    - "{{ elk_pipeline_dir }}"
    - "{{ elk_rules_dir }}"

- name: Copy ELK rules XML to host
  copy:
    src: "files/elk_rules.xml"
    dest: "{{ elk_rules_dir }}/elk_rules.xml"
    mode: "0644"

- name: Ensure tmp dir exists on controller
  delegate_to: localhost
  run_once: true
  become: false
  file:
    path: "{{ playbook_dir }}/tmp"
    state: directory
    mode: "0755"

- name: Generate Logstash pipeline from rules
  delegate_to: localhost
  run_once: true
  become: false
  shell: |
    python3 "{{ playbook_dir }}/files/generate_logstash_pipeline.py" \
      "{{ playbook_dir }}/files/elk_rules.xml" \
      > "{{ playbook_dir }}/tmp/01-rules.conf"
  args:
    executable: /bin/bash

- name: Copy base Logstash pipeline
  copy:
    src: "files/00-input.conf"
    dest: "{{ elk_pipeline_dir }}/00-input.conf"
    mode: "0644"

- name: Copy generated Logstash pipeline
  copy:
    src: "{{ playbook_dir }}/tmp/01-rules.conf"
    dest: "{{ elk_pipeline_dir }}/01-rules.conf"
    mode: "0644"

- name: Copy Logstash output pipeline
  copy:
    src: "files/99-output.conf"
    dest: "{{ elk_pipeline_dir }}/99-output.conf"
    mode: "0644"

- name: Copy Filebeat config
  copy:
    src: "files/filebeat.yml"
    dest: "{{ elk_base_dir }}/filebeat.yml"
    mode: "0644"

- name: Render docker compose file
  template:
    src: "templates/docker-compose.elk.j2"
    dest: "{{ elk_base_dir }}/docker-compose.yml"
    mode: "0644"
  vars:
    logstash_image: "{{ image_full }}"

- name: Login to AWS ECR
  shell: |
    aws ecr get-login-password --region eu-central-1 \
    | docker login --username AWS --password-stdin {{ registry_host }}
  args:
    executable: /bin/bash

- name: Pull ELK image
  shell: docker pull "{{ image_full }}"
  args:
    executable: /bin/bash

- name: Stop old ELK stack
  shell: |
    cd "{{ elk_base_dir }}"
    docker compose down --remove-orphans || true
  args:
    executable: /bin/bash

- name: Start ELK stack
  shell: |
    cd "{{ elk_base_dir }}"
    docker compose up -d
  args:
    executable: /bin/bash

- name: Wait for Kibana
  pause:
    seconds: 25

- name: Show running containers
  shell: docker ps --format '{{ "{{.Names}}" }}|{{ "{{.Image}}" }}|{{ "{{.Status}}" }}'
  register: docker_ps
  changed_when: false

- debug:
    var: docker_ps.stdout_lines
