---
- name: Set suricata variables
  set_fact:
    container_name: "{{ ecr.name | default('suricata') }}"
    image_full: "{{ ecr.ecr_repo_url }}:{{ ecr.image_tag | default('latest') }}"
    registry_host: "{{ ecr.ecr_repo_url.split('/')[0] }}"
    run_args: "{{ ecr.run_args | default('-d --restart unless-stopped') }}"

- name: Login to ECR for suricata
  shell: |
    export AWS_DEFAULT_REGION={{ aws_region }}
    aws ecr get-login-password --region {{ aws_region }} \
      | docker login --username AWS --password-stdin {{ registry_host }}
  args:
    executable: /bin/bash

- name: Pull suricata image
  shell: docker pull {{ image_full }}
  args:
    executable: /bin/bash

- name: Remove existing suricata container
  shell: docker rm -f {{ container_name }} || true
  args:
    executable: /bin/bash

- name: Run suricata container
  shell: docker run {{ run_args }} --name {{ container_name }} {{ image_full }}
  args:
    executable: /bin/bash

- name: Show running container
  shell: docker ps --filter "name={{ container_name }}"
  register: suricata_ps
  changed_when: false

- debug:
    var: suricata_ps.stdout_lines
